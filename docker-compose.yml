services:
  db:
    image: postgres:18-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tg_reader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-tg_reader}
    volumes:
      - pg_pulse_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tg_reader}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-tg_reader}
      API_ID: ${API_ID:-0}
      API_HASH: ${API_HASH:-}
      SESSION_NAME: /app/session/${SESSION_NAME:-telegram_session}
      PROXY_SCHEME: ${PROXY_SCHEME:-}
      PROXY_HOST: ${PROXY_HOST:-}
      PROXY_PORT: ${PROXY_PORT:-}
      TELEGRAM_SYNC_WAIT_TIME_SECONDS: ${TELEGRAM_SYNC_WAIT_TIME_SECONDS:-0.5}
      TELEGRAM_REQUEST_MIN_INTERVAL_SECONDS: ${TELEGRAM_REQUEST_MIN_INTERVAL_SECONDS:-0.8}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_images:/app/static/images
      - telegram_session:/app/session
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
        VITE_IMAGE_BASE: ""
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: always

volumes:
  pg_pulse_data:
  backend_images:
  telegram_session:
